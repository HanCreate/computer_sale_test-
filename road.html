<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>찾아오시는 길 - UNITHINK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID"></script>
</head>
<body>

    <div class="container" style="padding: 60px 20px;">
        <div class="section-header" style="text-align: center; margin-bottom: 40px;">
            <span class="section-tag">Location</span>
            <h2 class="section-title">찾아오시는 길</h2>
            <p class="section-desc">용산 UNITHINK 고객센터 위치를 안내해 드립니다.</p>
        </div>

        <div id="map" style="width:100%; height:500px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee;"></div>

        <div style="margin-top: 30px; text-align: center;">
            <p><strong>주소:</strong> 서울특별시 용산구 새창로45길 19 클릭나라 2층</p>
            <p><strong>운영시간:</strong> 평일 9:30 ~ 18:30 / 주말 휴무</p>
            <p><strong>상담/주문전화:</strong> 070-7715-7452</p>
            <br>
            <p><strong> 내방 전 고객 센터를 통해 미리 연락 부탁드립니다.</strong></p>
            <br>
            <a href="index.html" class="btn-store" style="display: inline-block; text-decoration: none;">메인으로 돌아가기</a>
        </div>
    </div>

    <script>
        // 매장 좌표 설정 (용산 전자상가 근처 예시 좌표입니다)
        var location_coords = new naver.maps.LatLng(37.5326, 126.9648);

        var mapOptions = {
            center: location_coords,
            zoom: 17,
            zoomControl: true, // 줌 컨트롤 표시
            zoomControlOptions: {
                position: naver.maps.Position.TOP_RIGHT
            }
        };

        var map = new naver.maps.Map('map', mapOptions);

        // 마커 찍기
        var marker = new naver.maps.Marker({
            position: location_coords,
            map: map,
            animation: naver.maps.Animation.BOUNCE // 마커가 톡톡 튀는 효과
        });
    </script>
</body>
</html>
